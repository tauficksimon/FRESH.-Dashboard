name: Process Dashboard Data

on:
  push:
    paths:
      - 'data/*.csv'
      - 'csv_merge_dashboard.py'
  workflow_dispatch:  # Allow manual trigger
  schedule:
    - cron: '0 12 * * 1'  # Every Monday at noon UTC (optional backup)

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '.python/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .python/requirements.txt

      - name: Check for CSV files
        id: check_files
        run: |
          if [ -f "data/orders.csv" ] && [ -f "data/items.csv" ]; then
            echo "csv_found=true" >> $GITHUB_OUTPUT
            echo "✅ CSV files found: orders.csv and items.csv"
          else
            echo "csv_found=false" >> $GITHUB_OUTPUT
            echo "⚠️ No CSV files found. Waiting for data upload."
            echo "   Expected files: data/orders.csv and data/items.csv"
          fi

      - name: Process CSV files
        if: steps.check_files.outputs.csv_found == 'true'
        run: |
          echo "Processing CSV files..."
          python csv_merge_dashboard.py

      - name: Inject JSON into HTML
        if: steps.check_files.outputs.csv_found == 'true'
        run: |
          echo "Injecting dashboard data into HTML template..."
          python scripts/inject_json.py

      - name: Copy JSON to React dashboard
        if: steps.check_files.outputs.csv_found == 'true'
        run: |
          echo "Copying dashboard_data.json to React dashboard public folder..."
          cp dashboard_data.json dashboard-shadcn/public/dashboard_data.json

      - name: Copy orders_ALL.csv for HAAP export
        if: steps.check_files.outputs.csv_found == 'true'
        run: |
          echo "Copying orders_ALL.csv to React dashboard for HAAP report export..."
          cp orders_ALL.csv dashboard-shadcn/orders_ALL.csv

      - name: Generate Advanced Metrics
        if: steps.check_files.outputs.csv_found == 'true'
        run: |
          echo "Generating advanced metrics (LTV, churn, cohorts)..."
          python scripts/advanced_metrics.py

      - name: Copy Advanced Metrics to React dashboard
        if: steps.check_files.outputs.csv_found == 'true'
        run: |
          echo "Copying advanced_metrics.json to React dashboard public folder..."
          cp advanced_metrics.json dashboard-shadcn/public/advanced_metrics.json

      - name: Generate Growth Metrics
        if: steps.check_files.outputs.csv_found == 'true'
        run: |
          echo "Generating growth metrics (CMGR, velocity, efficiency)..."
          python scripts/generate_growth_metrics.py

      - name: Commit updated dashboard
        if: steps.check_files.outputs.csv_found == 'true'
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add index.html output/* summary_metrics.csv dashboard-shadcn/public/dashboard_data.json dashboard-shadcn/public/advanced_metrics.json dashboard-shadcn/public/growth_metrics.json advanced_metrics.json dashboard-shadcn/orders_ALL.csv || true

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Update dashboard data - $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Skip message
        if: steps.check_files.outputs.csv_found == 'false'
        run: |
          echo "⏭️ Skipping dashboard processing - no CSV files uploaded yet"
          echo "Upload orders.csv and items.csv to /data/ folder to process data"

      - name: Upload artifacts
        if: steps.check_files.outputs.csv_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-outputs
          path: |
            index.html
            dashboard_data.json
            advanced_metrics.json
            summary_metrics.csv
            output/
